services:
  postgres:
    image: postgres:16-alpine
    container_name: netronic-postgres
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    ports:
      # Host port 5433 to avoid clashing with a native Postgres on 5432.
      # The container itself still listens on 5432 internally.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
